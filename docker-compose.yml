services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: watchtower
      POSTGRES_USER: watchtower
      POSTGRES_PASSWORD: watchtower
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchtower -d watchtower"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./Watchtower
      dockerfile: Watchtower/Watchtower.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=watchtower;Username=watchtower;Password=watchtower"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Secret: "${JWT_SECRET:-dev-secret-change-in-production-32chars}"
      Jwt__Issuer: "watchtower-api"
      Jwt__Audience: "watchtower-clients"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    build:
      context: ./WatchtowerUI
    ports:
      - "3000:80"
    depends_on:
      - api

  worker:
    build:
      context: ./Watchtower
      dockerfile: Watchtower/Watchtower.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=watchtower;Username=watchtower;Password=watchtower"
      ConnectionStrings__Redis: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
